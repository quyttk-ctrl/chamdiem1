<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chấm điểm 1 file</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

button{
padding:12px 18px;
border:none;
background:#4f67f7;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#4f67f7;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>📊 Hệ thống chấm điểm 1 file</h1>

<input
type="file"
accept=".xlsx,.xls"
onchange="loadExcel(this)"
>

<br>

<button onclick="scoreAll()">

🧮 Chấm điểm

</button>

<button onclick="exportExcel()">

📥 Xuất Excel

</button>

<div id="message"></div>

<table>

<thead>

<tr>

<th>SBD</th>
<th>Mã đề</th>
<th>Reading</th>
<th>Listening</th>
<th>Tổng</th>
<th>Trạng thái</th>

</tr>

</thead>

<tbody id="resultBody">

</tbody>

</table>

</div>

<script>

let rawRows=[];

let answerKeys={};

let students=[];

let results=[];

function msg(text){

document.getElementById(

"message"

).innerHTML=text;

}

function loadExcel(input){

const file=input.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=(e)=>{

const wb=

XLSX.read(

new Uint8Array(

e.target.result

),

{type:"array"}

);

const sheet=

wb.Sheets[
wb.SheetNames[0]
];

rawRows=

XLSX.utils.sheet_to_json(

sheet,

{

header:1,

defval:"",

raw:false

}

);

prepareData();

};

reader.readAsArrayBuffer(file);

}

function prepareData(){

answerKeys={};

students=[];

let headerRow=-1;

for(

let i=0;

i<rawRows.length;

i++

){

const row=

rawRows[i]

.map(x=>

String(x)

.trim()

);

if(

row.includes("SBD")

){

headerRow=i;

break;

}

}

if(

headerRow===-1

){

msg(

"❌ Không tìm thấy hàng SBD"

);

return;

}

const header=

rawRows[headerRow]

.map(x=>

String(x)

.trim()

);

const sbdIndex=

header.indexOf(

"SBD"

);

const codeIndex=

header.indexOf(

"Mã Đề"

)>=0

?

header.indexOf(

"Mã Đề"

)

:

header.indexOf(

"Mã đề"

);

const questionCols=[];

header.forEach(

(col,index)=>{

const n=

parseInt(

col

);

if(

!isNaN(n)

&&

n>=1

&&

n<=55

){

questionCols.push({

question:n,

col:index

});

}

}

);

questionCols.sort(

(a,b)=>

a.question-b.question

);

for(

let i=0;

i<headerRow;

i++

){

const row=

rawRows[i];

const code=

String(

row[codeIndex] ?? ''

)

.trim();

if(!code)continue;

let ans=[];

questionCols.forEach(q=>{

ans.push(

String(

row[q.col] ?? ''

)

.trim()

.toUpperCase()

);

});

answerKeys[code]=ans;

}

for(

let i=headerRow+1;

i<rawRows.length;

i++

){

const row=

rawRows[i];

const sbd=

String(

row[sbdIndex] ?? ''

)

.trim();

if(!sbd)continue;

students.push({

sbd,

code:

String(

row[codeIndex] ?? ''

)

.trim(),

row

});

}

msg(

`Đọc được ${students.length} sinh viên và ${Object.keys(answerKeys).length} mã đề`

);

window.questionCols=

questionCols;

}

function scoreAll(){

results=[];

students.forEach(st=>{

const key=

answerKeys[st.code];

if(!key){

results.push({

sbd:st.sbd,

code:st.code,

reading:"Lỗi",

listening:"Lỗi",

total:"Lỗi",

status:"Không có mã đề"

});

return;

}

let reading=0;

let listening=0;

questionCols.forEach(

(q,index)=>{

const ans=

String(

st.row[q.col] ?? ''

)

.trim()

.toUpperCase();

if(

ans===key[index]

){

if(

index<40

){

reading+=0.25;

}

else{

listening+=0.5;

}

}

}

);

results.push({

sbd:st.sbd,

code:st.code,

reading:

reading.toFixed(2),

listening:

listening.toFixed(2),

total:

(

reading+

listening

).toFixed(2),

status:"OK"

});

});

render();

}

function render(){

const tbody=

document.getElementById(

"resultBody"

);

tbody.innerHTML='';

results.forEach(r=>{

tbody.innerHTML += `

<tr>

<td>${r.sbd}</td>

<td>${r.code}</td>

<td>${r.reading}</td>

<td>${r.listening}</td>

<td>${r.total}</td>

<td>${r.status}</td>

</tr>

`;

});

}

function exportExcel(){

const data=[

[

"SBD",

"Mã đề",

"Reading",

"Listening",

"Tổng",

"Trạng thái"

]

];

results.forEach(r=>{

data.push([

r.sbd,

r.code,

r.reading,

r.listening,

r.total,

r.status

]);

});

const ws=

XLSX.utils.aoa_to_sheet(

data

);

const wb=

XLSX.utils.book_new();

XLSX.utils.book_append_sheet(

wb,

ws,

"KetQua"

);

XLSX.writeFile(

wb,

`KetQua_${Date.now()}.xlsx`

);

}

</script>

</body>
</html>
