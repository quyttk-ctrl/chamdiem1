<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Hệ Thống Chấm Điểm</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
margin:0;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

button{
padding:12px 18px;
border:none;
border-radius:6px;
background:#4f67f7;
color:white;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#4f67f7;
color:white;
}

.message{
margin-top:15px;
padding:10px;
border-radius:6px;
background:#e8f5e9;
}

</style>

</head>

<body>

<div class="container">

<h1>

📊 Hệ Thống Chấm Điểm

</h1>

<input

type="file"

accept=".xlsx,.xls"

onchange="loadExcel(this)"

>

<br>

<button onclick="scoreAll()">

🧮 Chấm Điểm

</button>

<button onclick="exportExcel()">

📥 Xuất Excel

</button>

<div id="message"></div>

<table>

<thead>

<tr>

<th>SBD</th>

<th>Mã đề</th>

<th>Reading</th>

<th>Listening</th>

<th>Tổng</th>

<th>Trạng thái</th>

</tr>

</thead>

<tbody id="resultBody">

</tbody>

</table>

</div>

<script>

let rawRows=[];

let answerKeys={};

let students=[];

let results=[];

let questionCols=[];

function msg(text){

document.getElementById(

"message"

).innerHTML=

`<div class="message">${text}</div>`;

}

function loadExcel(input){

const file=input.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=(e)=>{

const workbook=

XLSX.read(

new Uint8Array(

e.target.result

),

{

type:"array"

}

);

const sheet=

workbook.Sheets[

workbook.SheetNames[0]

];

rawRows=

XLSX.utils.sheet_to_json(

sheet,

{

header:1,

defval:"",

raw:false

}

);

prepareData();

};

reader.readAsArrayBuffer(file);

}

function prepareData(){

answerKeys={};

students=[];

questionCols=[];

let headerRow=-1;

for(

let i=0;

i<rawRows.length;

i++

){

const row=

rawRows[i];

const found=

row.some(

x=>

String(x)

.trim()

.toUpperCase()

==="SBD"

);

if(found){

headerRow=i;

break;

}

}

if(headerRow===-1){

msg(

"❌ Không tìm thấy hàng SBD"

);

return;

}

const studentHeader=

rawRows[headerRow]

.map(

x=>String(x).trim()

);

const sbdIndex=

studentHeader.findIndex(

x=>

x.toUpperCase()

==="SBD"

);

const codeIndex=

studentHeader.findIndex(

x=>

x.toUpperCase()

==="MÃ ĐỀ"

||

x.toUpperCase()

==="MÃ ĐỀ "

||

x.toUpperCase()

==="MÃ ĐỀ"

);

studentHeader.forEach(

(col,index)=>{

const n=

parseInt(

String(col)

.trim()

);

if(

!isNaN(n)

&&

n>=1

&&

n<=55

){

questionCols.push({

question:n,

col:index

});

}

}

);

questionCols.sort(

(a,b)=>

a.question-b.question

);

for(

let i=1;

i<headerRow;

i++

){

const row=

rawRows[i];

const code=

String(

row[4] ?? ''

)

.trim();

if(

!code

||

code.toUpperCase()

==="MÃ ĐỀ"

)

continue;

let answers=[];

questionCols.forEach(q=>{

answers.push(

String(

row[q.col] ?? ''

)

.trim()

.toUpperCase()

);

});

answerKeys[code]=answers;

}

for(

let i=headerRow+1;

i<rawRows.length;

i++

){

const row=

rawRows[i];

const sbd=

String(

row[sbdIndex] ?? ''

)

.trim();

if(!sbd)continue;

students.push({

sbd,

code:

String(

row[codeIndex] ?? ''

)

.trim(),

row

});

}

msg(

`Đã đọc ${students.length} sinh viên | ${Object.keys(answerKeys).length} mã đề`

);

}

function scoreAll(){

results=[];

students.forEach(st=>{

const key=

answerKeys[st.code];

if(!key){

results.push({

sbd:st.sbd,

code:st.code,

reading:"Lỗi",

listening:"Lỗi",

total:"Lỗi",

status:"Không có mã đề"

});

return;

}

let reading=0;

let listening=0;

questionCols.forEach(

(q,index)=>{

const ans=

String(

st.row[q.col] ?? ''

)

.trim()

.toUpperCase();

if(

ans===key[index]

){

if(index<40){

reading+=0.25;

}

else{

listening+=0.5;

}

}

}

);

results.push({

sbd:st.sbd,

code:st.code,

reading:

reading.toFixed(2),

listening:

listening.toFixed(2),

total:

(

reading+

listening

).toFixed(2),

status:"OK"

});

});

renderResults();

}

function renderResults(){

const tbody=

document.getElementById(

"resultBody"

);

tbody.innerHTML='';

results.forEach(r=>{

tbody.innerHTML += `

<tr>

<td>${r.sbd}</td>

<td>${r.code}</td>

<td>${r.reading}</td>

<td>${r.listening}</td>

<td>

<strong>

${r.total}

</strong>

</td>

<td>${r.status}</td>

</tr>

`;

});

}

function exportExcel(){

const data=[

[

"SBD",

"Mã đề",

"Reading",

"Listening",

"Tổng",

"Trạng thái"

]

];

results.forEach(r=>{

data.push([

r.sbd,

r.code,

r.reading,

r.listening,

r.total,

r.status

]);

});

const ws=

XLSX.utils.aoa_to_sheet(

data

);

const wb=

XLSX.utils.book_new();

XLSX.utils.book_append_sheet(

wb,

ws,

"KetQua"

);

XLSX.writeFile(

wb,

`KetQuaCham_${Date.now()}.xlsx`

);

}

</script>

</body>

</html>
