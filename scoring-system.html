<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Hệ Thống Chấm Điểm</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
margin:0;
}

.container{
max-width:1300px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

.section{
margin-bottom:25px;
padding:20px;
border:1px solid #ddd;
border-radius:8px;
}

button{

padding:12px 18px;

border:none;

border-radius:6px;

background:#4f67f7;

color:white;

cursor:pointer;

margin-top:10px;

margin-right:10px;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th,td{

border:1px solid #ddd;

padding:10px;

text-align:center;

}

th{

background:#4f67f7;

color:white;

}

.message{

padding:10px;

margin-top:10px;

border-radius:5px;

}

.success{

background:#d4edda;

}

.error{

background:#ffd6d6;

}

</style>

</head>

<body>

<div class="container">

<h1>

📊 Hệ Thống Chấm Điểm

</h1>

<div class="section">

<h3>

Upload File Đáp Án

</h3>

<input

id="answerFile"

type="file"

accept=".xlsx,.xls"

onchange="loadAnswerFile(this)"

>

<button onclick="replaceAnswerFile()">

🔄 Đổi File Đáp Án

</button>

<button onclick="clearAnswers()">

🗑 Xóa Đáp Án

</button>

<div id="answerMessage"></div>

</div>

<div class="section">

<h3>

Upload File Sinh Viên

</h3>

<input

type="file"

accept=".xlsx,.xls"

onchange="loadStudentFile(this)"

>

<div id="studentMessage"></div>

<button onclick="batchScore()">

🧮 Chấm Điểm

</button>

<button onclick="exportResults()">

📥 Xuất Excel

</button>

</div>

<div class="section">

<table>

<thead>

<tr>

<th>Số báo danh</th>

<th>Mã đề</th>

<th>Reading</th>

<th>Listening</th>

<th>Tổng</th>

<th>Trạng thái</th>

</tr>

</thead>

<tbody id="resultBody">

</tbody>

</table>

</div>

</div>

<script>

let uploadedData=[];

let batchResults=[];

let answerKeys=

JSON.parse(

localStorage.getItem(

"answerKeys"

)

||

"{}"

);

window.addEventListener(

"load",

()=>{

if(

Object.keys(

answerKeys

).length>0

){

showMessage(

"answerMessage",

`Đã khôi phục ${Object.keys(answerKeys).length} mã đề đã lưu`,

"success"

);

}

}

);

function showMessage(

id,

msg,

type

){

document.getElementById(id)

.innerHTML=

`<div class="${type} message">

${msg}

</div>`;

}

function replaceAnswerFile(){

document.getElementById(

"answerFile"

).click();

}

function clearAnswers(){

localStorage.removeItem(

"answerKeys"

);

answerKeys={};

showMessage(

"answerMessage",

"Đã xóa đáp án đã lưu",

"success"

);

}

function loadAnswerFile(input){

const file=

input.files[0];

if(!file)return;

const reader=

new FileReader();

reader.onload=(e)=>{

const wb=

XLSX.read(

new Uint8Array(

e.target.result

),

{

type:"array"

}

);

const rows=

XLSX.utils.sheet_to_json(

wb.Sheets[

wb.SheetNames[0]

],

{

defval:'',

raw:false

}

);

answerKeys={};

rows.forEach(row=>{

const code=

String(

row["Mã đề"]

??

row["Mã Đề"]

??

row["Code"]

??

''

).trim();

if(!code)return;

let answers=[];

for(

let i=1;

i<=55;

i++

){

answers.push(

String(

row[i]

??

''

)

.replace(/\s+/g,'')

.trim()

.toUpperCase()

);

}

answerKeys[code]=answers;

});

localStorage.setItem(

"answerKeys",

JSON.stringify(

answerKeys

)

);

showMessage(

"answerMessage",

`Đã lưu ${Object.keys(answerKeys).length} mã đề`,

"success"

);

};

reader.readAsArrayBuffer(

file

);

}

function loadStudentFile(input){

const file=

input.files[0];

if(!file)return;

const reader=

new FileReader();

reader.onload=(e)=>{

const wb=

XLSX.read(

new Uint8Array(

e.target.result

),

{

type:"array"

}

);

uploadedData=

XLSX.utils.sheet_to_json(

wb.Sheets[

wb.SheetNames[0]

],

{

defval:'',

raw:false

}

);

showMessage(

"studentMessage",

`Đã load ${uploadedData.length} sinh viên`,

"success"

);

};

reader.readAsArrayBuffer(

file

);

}

function batchScore(){

if(

uploadedData.length===0

){

alert(

"Chưa upload file sinh viên"

);

return;

}

if(

Object.keys(

answerKeys

).length===0

){

alert(

"Chưa upload file đáp án"

);

return;

}

batchResults=[];

uploadedData.forEach(

(row,index)=>{

const studentId=

String(

row["Số báo danh"]

??

row["SBD"]

??

row["MSSV"]

??

row["Mã SV"]

??

`SV_${index}`

).trim();

const code=

String(

row["Mã đề"]

??

row["Mã Đề"]

??

row["Code"]

??

''

).trim();

const key=

answerKeys[code];

if(!key){

batchResults.push({

studentId,

code,

reading:"Lỗi",

listening:"Lỗi",

total:"Lỗi",

status:

"Không tìm mã đề"

});

return;

}

let reading=0;

let listening=0;

const answerColumns=

Object.keys(row)

.filter(col=>{

const n=

parseInt(

String(col)

.trim()

);

return(

!isNaN(n)

&&

n>=1

&&

n<=55

);

})

.sort(

(a,b)=>

parseInt(a)

-

parseInt(b)

);

answerColumns.forEach(

(col,index)=>{

const ans=

String(

row[col]

??

''

)

.replace(/\s+/g,'')

.trim()

.toUpperCase();

if(

ans===key[index]

){

if(

index<40

){

reading+=0.25;

}

else{

listening+=0.5;

}

}

}

);

batchResults.push({

studentId,

code,

reading:

reading.toFixed(2),

listening:

listening.toFixed(2),

total:

(

reading+

listening

)

.toFixed(2),

status:"OK"

});

});

renderResults();

}

function renderResults(){

const tbody=

document.getElementById(

"resultBody"

);

tbody.innerHTML='';

batchResults.forEach(r=>{

tbody.innerHTML +=`

<tr>

<td>${r.studentId}</td>

<td>${r.code}</td>

<td>${r.reading}</td>

<td>${r.listening}</td>

<td>

<strong>

${r.total}

</strong>

</td>

<td>${r.status}</td>

</tr>

`;

});

}

function exportResults(){

const data=[

[

"Số báo danh",

"Mã đề",

"Reading",

"Listening",

"Tổng",

"Trạng thái"

]

];

batchResults.forEach(r=>{

data.push([

r.studentId,

r.code,

r.reading,

r.listening,

r.total,

r.status

]);

});

const ws=

XLSX.utils.aoa_to_sheet(

data

);

const wb=

XLSX.utils.book_new();

XLSX.utils.book_append_sheet(

wb,

ws,

"KetQua"

);

XLSX.writeFile(

wb,

`KetQuaCham_${Date.now()}.xlsx`

);

}

</script>

</body>

</html>
