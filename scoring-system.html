<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hệ Thống Chấm Điểm</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f3f5fa;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

h1{
margin-bottom:20px;
}

.section{
margin-bottom:30px;
padding:20px;
border:1px solid #ddd;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
background:#4f6ef7;
color:white;
cursor:pointer;
border-radius:6px;
margin-top:10px;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#4f6ef7;
color:white;
}

.message{
padding:10px;
margin-top:10px;
border-radius:5px;
}

.success{
background:#d4edda;
}

.error{
background:#ffd6d6;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Hệ Thống Chấm Điểm Bài Thi</h1>

<div class="section">

<h3>1. Upload file đáp án</h3>

<input
type="file"
id="answerFile"
accept=".xlsx,.xls"
onchange="loadAnswerFile(this)">

<div id="answerMessage"></div>

</div>

<div class="section">

<h3>2. Upload file sinh viên</h3>

<input
type="file"
id="studentFile"
accept=".xlsx,.xls"
onchange="handleStudentFile(this)">

<div id="studentMessage"></div>

<button onclick="batchScore()">

🧮 Chấm Điểm

</button>

<button onclick="exportResults()">

📥 Xuất Excel

</button>

</div>

<div class="section">

<h3>Kết quả</h3>

<table>

<thead>

<tr>

<th>Số báo danh</th>

<th>Mã đề</th>

<th>Tổng điểm</th>

<th>Trạng thái</th>

</tr>

</thead>

<tbody id="resultBody"></tbody>

</table>

</div>

</div>

<script>

let uploadedData=[];

let answerKeys={};

let questionScores=[];

let batchResults=[];

function showMessage(id,msg,type){

document.getElementById(id).innerHTML=

`<div class="message ${type}">
${msg}
</div>`;

}

function loadAnswerFile(input){

const file=input.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=(e)=>{

const data=

new Uint8Array(
e.target.result
);

const wb=

XLSX.read(
data,
{type:'array'}
);

const sheet=

wb.Sheets[
wb.SheetNames[0]
];

const rows=

XLSX.utils.sheet_to_json(
sheet,
{defval:''}
);

answerKeys={};

questionScores=[];

rows.forEach(row=>{

const code=

row["Mã đề"] ||
row["Mã Đề"] ||
row["Code"];

if(!code)return;

let answers=[];

for(let i=1;i<=55;i++){

answers.push(

(
row[`Câu ${i}`] ||

row[`C${i}`] ||

''

)

.toString()

.trim()

.toUpperCase()

);

if(questionScores.length<55){

questionScores.push(

Number(

row[`Điểm ${i}`] ||

row[`Score ${i}`] ||

0

)

);

}

}

answerKeys[code]=answers;

});

showMessage(

"answerMessage",

`Đã load ${Object.keys(answerKeys).length} mã đề`,

"success"

);

};

reader.readAsArrayBuffer(file);

}

function handleStudentFile(input){

const file=input.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=(e)=>{

const data=

new Uint8Array(
e.target.result
);

const wb=

XLSX.read(
data,
{type:'array'}
);

const sheet=

wb.Sheets[
wb.SheetNames[0]
];

uploadedData=

XLSX.utils.sheet_to_json(
sheet,
{defval:''}
);

showMessage(

"studentMessage",

`Đã load ${uploadedData.length} sinh viên`,

"success"

);

};

reader.readAsArrayBuffer(file);

}

function batchScore(){

if(uploadedData.length===0){

alert("Chưa upload file sinh viên");

return;

}

if(

Object.keys(answerKeys).length===0

){

alert("Chưa upload file đáp án");

return;

}

batchResults=[];

uploadedData.forEach((row,index)=>{

const studentId=

row["Số báo danh"] ||

row["SBD"] ||

row["MSSV"] ||

row["Mã SV"] ||

`SV_${index}`;

const code=

row["Mã đề"] ||

row["Mã Đề"] ||

row["Code"] ||

"";

const key=

answerKeys[code];

if(!key){

batchResults.push({

studentId,

code,

total:"Lỗi",

status:"Không tìm thấy mã đề"

});

return;

}

let total=0;

for(let i=1;i<=55;i++){

const ans=

(

row[`Câu ${i}`] ||

row[`C${i}`] ||

''

)

.toString()

.trim()

.toUpperCase();

if(

ans===key[i-1]

){

total +=

Number(

questionScores[i-1] || 0

);

}

}

batchResults.push({

studentId,

code,

total:total.toFixed(2),

status:"OK"

});

});

renderResults();

}

function renderResults(){

const tbody=

document.getElementById(
"resultBody"
);

tbody.innerHTML='';

batchResults.forEach(r=>{

tbody.innerHTML +=

`

<tr>

<td>${r.studentId}</td>

<td>${r.code}</td>

<td>${r.total}</td>

<td>${r.status}</td>

</tr>

`;

});

}

function exportResults(){

if(batchResults.length===0){

alert("Chưa có kết quả");

return;

}

const data=[

["Số báo danh","Mã đề","Tổng điểm","Trạng thái"]

];

batchResults.forEach(r=>{

data.push([

r.studentId,

r.code,

r.total,

r.status

]);

});

const ws=

XLSX.utils.aoa_to_sheet(
data
);

const wb=

XLSX.utils.book_new();

XLSX.utils.book_append_sheet(

wb,

ws,

"KetQua"

);

XLSX.writeFile(

wb,

"KetQuaCham.xlsx"

);

}

</script>

</body>
</html>
